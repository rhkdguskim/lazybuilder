name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel superseded runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node ${{ matrix.node }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CLI boots (--version)
        run: node bin/lazybuilder.js --version

      - name: Verify CLI help
        run: node bin/lazybuilder.js --help

  pack-smoke:
    name: pack smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - name: npm pack (dry-run)
        run: npm pack --dry-run
      - name: Tarball must not contain agent.md or docs/
        run: |
          npm pack --dry-run --json > pack.json
          if grep -E '"path": "(agent\.md|docs/)' pack.json; then
            echo "ERROR: agent.md or docs/ found in tarball — should be excluded via package.json files"
            exit 1
          fi
          echo "OK: tarball is clean"
