name: Bug report
description: Something doesn't work as documented.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One sentence summary, then expected vs actual.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands and project files (or a minimal repo) that show the bug.
      render: bash
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: lazybuilder version
      description: Output of `lazybuilder --version`
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [Windows, macOS, Linux]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log file
      description: |
        Attach the latest entries from `~/.lazybuilder/logs/lazybuilder-YYYYMMDD.ndjson`.
        Run with `LAZYBUILDER_LOG_LEVEL=debug` for verbose output.
      render: text
